<details class="details-reset animated-details mb-5" style="background: {% if site.style == 'dark' %}rgba(255,255,255,0.01){% else %}rgba(0,0,0,0.01){% endif %}; border: 1px solid {% if site.style == 'dark' %}rgba(255,255,255,0.05){% else %}rgba(0,0,0,0.04){% endif %}; border-radius: 12px;" open>
  <summary class="p-4 d-flex flex-justify-between flex-items-center" style="cursor: pointer; user-select: none; border-bottom: 1px solid {% if site.style == 'dark' %}rgba(255,255,255,0.05){% else %}rgba(0,0,0,0.04){% endif %};">
    <h2 id="my-writing" class="f2 fw-bold {% if site.style == 'dark' %}text-white{% else %}text-gray-dark{% endif %}" style="margin-bottom: 0 !important; border-bottom: none;">Insights & Writing</h2>
    <svg class="collapse-arrow text-gray flex-shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="24" height="24" fill="currentColor">
      <path d="M12.78 6.22a.75.75 0 0 1 0 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L3.22 7.28a.75.75 0 0 1 1.06-1.06L8 9.94l3.72-3.72a.75.75 0 0 1 1.06 0Z"></path>
    </svg>
  </summary>

  <div class="p-4 text-left">
    <p class="f4 mb-4 {% if site.style == 'dark' %}text-white{% else %}text-gray{% endif %}">Articles I've published on Medium.</p>

    <div class="d-flex flex-column flex-lg-row" style="gap: 32px; align-items: flex-start;">
      
      <!-- Left Column: My Writing -->
      <div class="col-12 col-lg-6 right-column-container" style="min-width: 0; height: 648px;">
        <div class="right-column-content d-flex flex-column w-100 h-100">
          <div class="d-flex flex-justify-between flex-items-center mb-3 flex-shrink-0">
            <div id="medium-filters" style="display:none;">
              <button class="medium-filter-btn active" data-filter="all">All</button>
            </div>
          </div>

          <div id="medium-posts" class="d-flex flex-column flex-auto custom-scrollbar" style="gap: 12px; overflow-y: auto; min-height: 0; padding-right: 8px;">
            <div class="col-12 text-center py-4 text-gray" id="medium-loading">
              Loading articles&hellip;
            </div>
          </div>
          
          <div class="d-flex flex-justify-between flex-items-center mt-3 pt-3 flex-shrink-0 border-top" style="border-color: rgba(149, 157, 165, 0.15) !important;">
            <a href="https://medium.com/@frdspuzi/subscribe" class="btn btn-sm btn-invisible text-gray d-inline-flex flex-items-center" style="gap: 6px;" target="_blank" rel="noopener noreferrer">
              <svg class="octicon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" fill="currentColor">
                <path d="M1.75 2h12.5c.966 0 1.75.784 1.75 1.75v8.5A1.75 1.75 0 0 1 14.25 14H1.75A1.75 1.75 0 0 1 0 12.25v-8.5C0 2.784.784 2 1.75 2ZM1.5 12.251c0 .138.112.25.25.25h12.5a.25.25 0 0 0 .25-.25V5.809L8.38 9.397a.75.75 0 0 1-.76 0L1.5 5.809v6.442Zm13-8.181v-.32a.25.25 0 0 0-.25-.25H1.75a.25.25 0 0 0-.25.25v.32L8 7.88Z"></path>
              </svg>
              Get updates
            </a>
            <a href="https://medium.com/@frdspuzi" class="f6 text-gray text-underline" target="_blank" rel="noopener noreferrer">View all &rarr;</a>
          </div>
        </div>
      </div>

      <!-- Right Column: Insights / Trivia -->
      <div class="col-12 col-lg-6 flex-shrink-0 d-flex flex-column">
        {% include learning_board.html %}
      </div>

    </div>
  </div>
</details>

<script>
(function () {
  var MEDIUM_RSS = 'https://medium.com/feed/@frdspuzi';
  var API_URL = 'https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(MEDIUM_RSS);
  var container = document.getElementById('medium-posts');
  var filtersBar = document.getElementById('medium-filters');
  var activeFilter = 'all';

  function stripHtml(html) {
    var tmp = document.createElement('div');
    tmp.innerHTML = html;
    return tmp.textContent || tmp.innerText || '';
  }

  function extractSummary(html) {
    var tmp = document.createElement('div');
    tmp.innerHTML = html;
    var result = '';

    var paragraphs = tmp.querySelectorAll('p');
    for (var i = 0; i < paragraphs.length; i++) {
      var text = (paragraphs[i].textContent || '').trim();
      var lower = text.toLowerCase();
      if (lower.indexOf('tldr') === 0 || lower.indexOf('tl;dr') === 0 || lower.indexOf('problem statement') === 0) {
        result = text;
        break;
      }
    }

    if (!result) {
      var blockquote = tmp.querySelector('blockquote');
      if (blockquote) {
        var bqText = (blockquote.textContent || '').replace(/\s+/g, ' ').trim();
        if (bqText.length > 20) result = bqText;
      }
    }

    if (!result) {
      for (var i = 0; i < paragraphs.length; i++) {
        var text = (paragraphs[i].textContent || '').replace(/\s+/g, ' ').trim();
        if (text.length > 80) {
          result = text;
          break;
        }
      }
    }

    if (!result) {
      result = (tmp.textContent || '').replace(/\s+/g, ' ').trim();
    }

    // Strip "TLDR;", "TL;DR:", "Problem Statement:" from the very beginning
    result = result.replace(/^(TL;?DR|Problem Statement)[\s;:.,-]+/i, '').trim();

    if (result.length > 140) {
      result = result.slice(0, 140).trim() + '…';
    }
    return result;
  }

  function formatDate(dateStr) {
    var d = new Date(dateStr);
    return d.toLocaleDateString('en-GB', { year: 'numeric', month: 'short', day: 'numeric' });
  }

  function buildCard(item, category) {
    var excerpt = extractSummary(item.content);

    var imageUrl = null;
    var imgRegex = /<img[^>]+src="([^">]+)"/g;
    var match;
    while ((match = imgRegex.exec(item.content)) !== null) {
      if (match[1].indexOf('stat?event') === -1) {
        imageUrl = match[1];
        break;
      }
    }

    var imageHtml = '';
    if (imageUrl) {
      imageHtml = '<div class="medium-image flex-shrink-0" style="background-image: url(\'' + imageUrl + '\'); width: 160px; border-right: 1px solid #e1e4e8;"></div>';
    }

    var card = document.createElement('div');
    card.className = 'medium-card-wrapper w-100';
    card.setAttribute('data-category', category);
    card.innerHTML =
      '<a href="' + item.link + '" target="_blank" rel="noopener noreferrer" ' +
        'style="text-decoration:none; display:block;">' +
        '<div class="Box box-shadow-small medium-card overflow-hidden d-flex flex-row text-left" style="min-height: 120px;">' +
          imageHtml +
          '<div class="p-3 d-flex flex-column flex-auto flex-justify-between" style="min-width: 0;">' +
            '<div>' +
              '<h3 class="f4 text-bold lh-condensed mb-1 medium-title text-truncate">' + item.title + '</h3>' +
              '<p class="f6 text-gray medium-excerpt mb-2" style="-webkit-line-clamp: 2;">' + excerpt + '</p>' +
            '</div>' +
            '<div class="d-flex flex-items-center" style="gap:8px;">' +
              '<span class="f6 text-gray medium-date mb-0">' + formatDate(item.pubDate) + '</span>' +
              (category !== 'uncategorized' ? '<span class="medium-tag">' + category + '</span>' : '') +
            '</div>' +
          '</div>' +
        '</div>' +
      '</a>';
    return card;
  }

  function applyFilter(filter) {
    activeFilter = filter;
    var cards = container.querySelectorAll('.medium-card-wrapper');
    cards.forEach(function(card) {
      var cat = card.getAttribute('data-category');
      if (filter === 'all' || cat === filter) {
        card.style.opacity = '0';
        card.style.display = '';
        setTimeout(function(c) { return function() { c.style.opacity = '1'; }; }(card), 10);
      } else {
        card.style.opacity = '0';
        setTimeout(function(c) { return function() { c.style.display = 'none'; }; }(card), 200);
      }
    });

    var btns = filtersBar.querySelectorAll('.medium-filter-btn');
    btns.forEach(function(btn) {
      btn.classList.toggle('active', btn.getAttribute('data-filter') === filter);
    });

    if (typeof window.filterTrivia === 'function') {
      window.filterTrivia(filter);
    }
  }

  function buildFilters(categories) {
    filtersBar.innerHTML = '';
    var allBtn = document.createElement('button');
    allBtn.className = 'medium-filter-btn active';
    allBtn.setAttribute('data-filter', 'all');
    allBtn.textContent = 'All';
    allBtn.addEventListener('click', function() { applyFilter('all'); });
    filtersBar.appendChild(allBtn);

    categories.forEach(function(cat) {
      if (cat === 'uncategorized') return;
      var btn = document.createElement('button');
      btn.className = 'medium-filter-btn';
      btn.setAttribute('data-filter', cat);
      btn.textContent = cat;
      btn.addEventListener('click', function() { applyFilter(cat); });
      filtersBar.appendChild(btn);
    });

    filtersBar.style.display = 'flex';
  }

  fetch(API_URL)
    .then(function (res) { return res.json(); })
    .then(function (data) {
      container.innerHTML = '';
      if (!data.items || data.items.length === 0) {
        container.innerHTML = '<p class="text-gray">No articles found.</p>';
        return;
      }

      var seenCategories = [];
      var items = data.items.slice(0, 10); /* Fetch more items since the container is now scrollable */

      items.forEach(function (item) {
        var category = (item.categories && item.categories.length > 0)
          ? item.categories[0]
          : 'uncategorized';

        if (seenCategories.indexOf(category) === -1 && category !== 'uncategorized') {
          seenCategories.push(category);
        }

        var card = buildCard(item, category);
        card.style.opacity = '0';
        container.appendChild(card);
        setTimeout(function(c) { return function() { c.style.opacity = '1'; }; }(card), 10);
      });

      if (seenCategories.length > 1) {
        buildFilters(seenCategories);
      }
    })
    .catch(function () {
      container.innerHTML =
        '<p class="text-gray">Could not load articles. ' +
        '<a href="https://medium.com/@frdspuzi" target="_blank" rel="noopener noreferrer">Read on Medium &rarr;</a></p>';
    });
})();
</script>

      position: absolute;
      top: 0; bottom: 0; left: 0; right: 0;

  }

  .medium-card-wrapper {

  }

  .medium-card-wrapper {
    transition: opacity 0.2s ease;
  }

  }

  }
  .medium-title {

  }

    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .medium-date {
    color: #959da5;
  }
  .medium-image {

    background-position: center;
  }
  .medium-read-more {
    color: #0366d6;
    font-weight: 500;
  }
  .medium-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 12px;
    background-color: #f1f8ff;
    color: #0366d6;

    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  #medium-filters {
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }
  .medium-filter-btn {
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid #e1e4e8;
    background: white;
    color: #586069;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .medium-filter-btn:hover {
    border-color: #0366d6;
    color: #0366d6;
  }
  .medium-filter-btn.active {
    background: #0366d6;
    border-color: #0366d6;
    color: white;
  }

  /* Collapse Animation Styles */
  .animated-details > summary {
    list-style: none; /* Hide native triangle */
  }
  .animated-details > summary::-webkit-details-marker {
    display: none; /* Hide Safari native triangle */
  }
  .collapse-arrow {
    transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    transform: rotate(-90deg); /* Points Right when closed */
  }
  .animated-details[open] .collapse-arrow {
    transform: rotate(0deg); /* Points Down when open */
  }
</style>
