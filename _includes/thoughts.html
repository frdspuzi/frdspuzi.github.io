<h2 id="my-writing" {% if site.style == 'dark' %}class="text-white"{% endif %}>My Writing</h2>
<p class="f4 mb-4 {% if site.style == 'dark' %}text-white{% else %}text-gray{% endif %}">Articles I've published on Medium.</p>

<div class="d-flex flex-column flex-lg-row" style="gap: 32px; align-items: stretch;">
  
  <!-- Left Column: Insights / Trivia -->
  <div class="col-12 col-lg-5 col-xl-4 flex-shrink-0 d-flex flex-column">
    {% include learning_board.html %}
  </div>

  <!-- Right Column: My Writing -->
  <div class="col-12 col-lg-7 col-xl-8 flex-auto d-flex flex-column" style="min-width: 0;">
    <div class="d-flex flex-justify-between flex-items-center mb-3">
      <div id="medium-filters" style="display:none;">
        <button class="medium-filter-btn active" data-filter="all">All</button>
      </div>
      <a href="https://medium.com/@frdspuzi" class="f6 text-underline" style="color: #0366d6; white-space: nowrap;" target="_blank" rel="noopener noreferrer">View all &rarr;</a>
    </div>

    <div id="medium-posts" class="d-flex flex-column flex-auto height-full" style="gap: 12px;">
      <div class="col-12 text-center py-4 text-gray" id="medium-loading">
        Loading articles&hellip;
      </div>
    </div>
  </div>

</div>

<script>
(function () {
  var MEDIUM_RSS = 'https://medium.com/feed/@frdspuzi';
  var API_URL = 'https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(MEDIUM_RSS);
  var container = document.getElementById('medium-posts');
  var filtersBar = document.getElementById('medium-filters');
  var activeFilter = 'all';

  function stripHtml(html) {
    var tmp = document.createElement('div');
    tmp.innerHTML = html;
    return tmp.textContent || tmp.innerText || '';
  }

  function extractSummary(html) {
    var tmp = document.createElement('div');
    tmp.innerHTML = html;

    var paragraphs = tmp.querySelectorAll('p');
    for (var i = 0; i < paragraphs.length; i++) {
      var text = (paragraphs[i].textContent || '').trim();
      var lower = text.toLowerCase();
      if (lower.indexOf('tldr;') === 0 || lower.indexOf('tldr:') === 0) {
        return text.substring(5).trim();
      } else if (lower.indexOf('problem statement:') === 0) {
        return text.substring(18).trim();
      }
    }

    var blockquote = tmp.querySelector('blockquote');
    if (blockquote) {
      var bqText = (blockquote.textContent || '').replace(/\s+/g, ' ').trim();
      if (bqText.length > 20) return bqText;
    }

    for (var i = 0; i < paragraphs.length; i++) {
      var text = (paragraphs[i].textContent || '').replace(/\s+/g, ' ').trim();
      if (text.length > 80) return text;
    }

    var fallback = (tmp.textContent || '').replace(/\s+/g, ' ').trim().slice(0, 140);
    if (fallback.length === 140) fallback += '…';
    return fallback;
  }

  function formatDate(dateStr) {
    var d = new Date(dateStr);
    return d.toLocaleDateString('en-GB', { year: 'numeric', month: 'short', day: 'numeric' });
  }

  function buildCard(item, category) {
    var excerpt = extractSummary(item.content);

    var imageUrl = null;
    var imgRegex = /<img[^>]+src="([^">]+)"/g;
    var match;
    while ((match = imgRegex.exec(item.content)) !== null) {
      if (match[1].indexOf('stat?event') === -1) {
        imageUrl = match[1];
        break;
      }
    }

    var imageHtml = '';
    if (imageUrl) {
      imageHtml = '<div class="medium-image flex-shrink-0" style="background-image: url(\'' + imageUrl + '\'); width: 160px; border-right: 1px solid #e1e4e8;"></div>';
    }

    var card = document.createElement('div');
    card.className = 'medium-card-wrapper w-100 flex-auto';
    card.setAttribute('data-category', category);
    card.innerHTML =
      '<a href="' + item.link + '" target="_blank" rel="noopener noreferrer" ' +
        'style="text-decoration:none; display:block; height:100%;">' +
        '<div class="Box box-shadow-small medium-card overflow-hidden d-flex flex-row height-full text-left" style="min-height: 120px;">' +
          imageHtml +
          '<div class="p-3 d-flex flex-column flex-auto flex-justify-between" style="min-width: 0;">' +
            '<div>' +
              '<h3 class="f4 text-bold lh-condensed mb-1 medium-title text-truncate">' + item.title + '</h3>' +
              '<p class="f6 text-gray medium-excerpt mb-2" style="-webkit-line-clamp: 2;">' + excerpt + '</p>' +
            '</div>' +
            '<div class="d-flex flex-items-center" style="gap:8px;">' +
              '<span class="f6 text-gray medium-date mb-0">' + formatDate(item.pubDate) + '</span>' +
              (category !== 'uncategorized' ? '<span class="medium-tag">' + category + '</span>' : '') +
            '</div>' +
          '</div>' +
        '</div>' +
      '</a>';
    return card;
  }

  function applyFilter(filter) {
    activeFilter = filter;
    var cards = container.querySelectorAll('.medium-card-wrapper');
    cards.forEach(function(card) {
      var cat = card.getAttribute('data-category');
      if (filter === 'all' || cat === filter) {
        card.style.opacity = '0';
        card.style.display = '';
        setTimeout(function(c) { return function() { c.style.opacity = '1'; }; }(card), 10);
      } else {
        card.style.opacity = '0';
        setTimeout(function(c) { return function() { c.style.display = 'none'; }; }(card), 200);
      }
    });

    var btns = filtersBar.querySelectorAll('.medium-filter-btn');
    btns.forEach(function(btn) {
      btn.classList.toggle('active', btn.getAttribute('data-filter') === filter);
    });
  }

  function buildFilters(categories) {
    filtersBar.innerHTML = '';
    var allBtn = document.createElement('button');
    allBtn.className = 'medium-filter-btn active';
    allBtn.setAttribute('data-filter', 'all');
    allBtn.textContent = 'All';
    allBtn.addEventListener('click', function() { applyFilter('all'); });
    filtersBar.appendChild(allBtn);

    categories.forEach(function(cat) {
      if (cat === 'uncategorized') return;
      var btn = document.createElement('button');
      btn.className = 'medium-filter-btn';
      btn.setAttribute('data-filter', cat);
      btn.textContent = cat;
      btn.addEventListener('click', function() { applyFilter(cat); });
      filtersBar.appendChild(btn);
    });

    filtersBar.style.display = 'flex';
  }

  fetch(API_URL)
    .then(function (res) { return res.json(); })
    .then(function (data) {
      container.innerHTML = '';
      if (!data.items || data.items.length === 0) {
        container.innerHTML = '<p class="text-gray">No articles found.</p>';
        return;
      }

      var seenCategories = [];
      var items = data.items.slice(0, 3); /* 3 items stacked vertically looks perfectly balanced */

      items.forEach(function (item) {
        var category = (item.categories && item.categories.length > 0)
          ? item.categories[0]
          : 'uncategorized';

        if (seenCategories.indexOf(category) === -1 && category !== 'uncategorized') {
          seenCategories.push(category);
        }

        var card = buildCard(item, category);
        card.style.opacity = '0';
        container.appendChild(card);
        setTimeout(function(c) { return function() { c.style.opacity = '1'; }; }(card), 10);
      });

      if (seenCategories.length > 1) {
        buildFilters(seenCategories);
      }
    })
    .catch(function () {
      container.innerHTML =
        '<p class="text-gray">Could not load articles. ' +
        '<a href="https://medium.com/@frdspuzi" target="_blank" rel="noopener noreferrer">Read on Medium &rarr;</a></p>';
    });
})();
</script>

<style>
  .medium-card-wrapper {
    transition: opacity 0.2s ease;
  }

  .medium-card-wrapper {
    transition: opacity 0.2s ease;
  }

  .medium-card {
    border-radius: 8px;
    transition: box-shadow 0.2s ease, transform 0.2s ease;
    border: 1px solid #e1e4e8;
  }
  .medium-card:hover {
    box-shadow: 0 4px 20px rgba(0,0,0,0.12) !important;
    transform: translateY(-2px);
  }
  .medium-title {
    color: #24292e;
  }
  .medium-excerpt {
    color: #6a737d;
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .medium-date {
    color: #959da5;
  }
  .medium-image {
    background-size: cover;
    background-position: center;
  }
  .medium-read-more {
    color: #0366d6;
    font-weight: 500;
  }
  .medium-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 12px;
    background-color: #f1f8ff;
    color: #0366d6;
    border: 1px solid #c8e1ff;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  #medium-filters {
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }
  .medium-filter-btn {
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid #e1e4e8;
    background: white;
    color: #586069;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .medium-filter-btn:hover {
    border-color: #0366d6;
    color: #0366d6;
  }
  .medium-filter-btn.active {
    background: #0366d6;
    border-color: #0366d6;
    color: white;
  }
</style>
