<!-- Floating Table of Contents -->
<nav id="floating-toc" aria-label="Page navigation">
  <div id="floating-toc-tab" title="Navigation">☰</div>
  <div id="floating-toc-panel">
    <p id="floating-toc-label">On this page</p>
    <ul>
      <li><button class="toc-link" data-target="about">About</button></li>
      <li><button class="toc-link" data-target="my-writing">My Writing</button></li>
      <li><button class="toc-link" data-target="gratitude">Gratitude</button></li>
      <li><button class="toc-link" data-target="photography">Photography</button></li>
    </ul>
  </div>
</nav>

<style>
  #floating-toc {
    position: fixed;
    left: 0;
    top: 24px;
    z-index: 1000;
    display: flex;
    align-items: flex-start;
  }

  @media (max-width: 767px) {
    #floating-toc { display: none; }
  }

  /* The collapsed tab — always visible */
  #floating-toc-tab {
    width: 36px;
    height: 56px;
    background: #0366d6;
    color: white;
    border-radius: 0 8px 8px 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    cursor: pointer;
    box-shadow: 2px 2px 8px rgba(0,0,0,0.15);
    transition: background 0.2s ease;
    flex-shrink: 0;
    user-select: none;
    order: 1;
  }

  #floating-toc:hover #floating-toc-tab {
    background: #0256b9;
    border-radius: 0;
  }

  /* The expanded panel — slides out to the right on hover */
  #floating-toc-panel {
    background: white;
    border: 1px solid #e1e4e8;
    border-left: none;
    border-radius: 0 8px 8px 0;
    box-shadow: 4px 2px 16px rgba(0,0,0,0.1);
    width: 0;
    overflow: hidden;
    opacity: 0;
    transition: width 0.25s ease, opacity 0.2s ease;
    white-space: nowrap;
    order: 2;
    /* Vertically align content */
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-top: 0;
    padding-bottom: 0;
  }

  #floating-toc:hover #floating-toc-panel {
    width: 160px;
    opacity: 1;
    padding: 14px 16px;
  }

  #floating-toc-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #959da5;
    margin: 0 0 8px 0;
  }

  #floating-toc-panel ul {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .toc-link {
    display: block;
    width: 100%;
    text-align: left;
    font-size: 13px;
    font-weight: 500;
    color: #24292e;
    text-decoration: none;
    padding: 4px 8px;
    border-radius: 4px;
    border: none;
    background: none;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
    border-left: 2px solid transparent;
  }

  .toc-link:hover {
    background: #f1f8ff;
    color: #0366d6;
  }

  .toc-link.toc-active {
    color: #0366d6;
    border-left-color: #0366d6;
    background: #f1f8ff;
  }
</style>

<script>
  (function () {
    var sections = [
      { id: 'about' },
      { id: 'my-writing' },
      { id: 'gratitude' },
      { id: 'photography' }
    ];

    // Scroll to a section reliably every time, regardless of current hash
    function scrollToSection(id) {
      if (id === 'about') {
        window.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      var el = document.getElementById(id);
      if (!el) return;
      el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function updateActiveLink() {
      var windowH = window.innerHeight;
      var activeId = sections[0].id;

      for (var i = sections.length - 1; i >= 0; i--) {
        var el = document.getElementById(sections[i].id);
        if (el && el.getBoundingClientRect().top <= windowH * 0.4) {
          activeId = sections[i].id;
          break;
        }
      }

      document.querySelectorAll('.toc-link').forEach(function (btn) {
        btn.classList.toggle('toc-active', btn.getAttribute('data-target') === activeId);
      });
    }

    document.addEventListener('DOMContentLoaded', function () {
      // Wire up click handlers — use scrollIntoView so every click works
      document.querySelectorAll('.toc-link').forEach(function (btn) {
        btn.addEventListener('click', function () {
          scrollToSection(btn.getAttribute('data-target'));
        });
      });

      updateActiveLink();
      window.addEventListener('scroll', updateActiveLink, { passive: true });
    });
  })();
</script>
