{% if site.data.learning and site.data.learning.learnings %}
<div class="learning-board box-shadow-large mb-4 mb-md-0 p-5 p-md-6 border rounded-2 flex-auto d-flex flex-column flex-justify-center {% if site.style == 'dark' %}bg-gray-dark border-gray-dark{% else %}bg-white border-gray-light{% endif %} position-relative overflow-hidden">
  
  <!-- Subtle decorative background element -->
  <div class="position-absolute" style="top: -20px; right: -20px; opacity: 0.05; font-size: 150px; line-height: 1; pointer-events: none; user-select: none;">
    🧠
  </div>

  <div class="position-relative z-1 text-center text-md-left">
    <h3 class="f5 text-uppercase text-gray-light mb-1 tracking-wide" style="letter-spacing: 2px;">AI Insight of the Day</h3>
    <p class="f6 text-gray mb-4">Test your knowledge with a daily trivia question generated by AI from my articles!</p>

    <div id="trivia-container" style="min-height: 200px;">
      <!-- Question -->
      <h2 id="trivia-question" class="f2 mb-3" style="line-height: 1.4; font-weight: 500; {% if site.style == 'dark' %}color: #e1e4e8;{% else %}color: #24292e;{% endif %}">
        Loading question...
      </h2>

      <!-- Article source attribution / hint -->
      <p id="trivia-source" class="f6 mb-4" style="{% if site.style == 'dark' %}color: #8b949e;{% else %}color: #6a737d;{% endif %}">
        <span>Not sure? Read: </span><a id="trivia-source-link" href="#" class="text-underline" style="{% if site.style == 'dark' %}color: #8b949e;{% else %}color: #6a737d;{% endif %}" target="_blank" rel="noopener noreferrer"></a>
      </p>

      <!-- Options -->
      <div id="trivia-options" class="d-flex flex-column" style="gap: 12px; margin-bottom: 16px;">
        <!-- Buttons injected by JS -->
      </div>

      <!-- Pagination -->
      <div id="trivia-helpers" class="d-flex flex-justify-between flex-items-center mb-4">
        <button id="btn-prev" type="button" class="btn btn-invisible p-2 text-gray" aria-label="Previous">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" fill="currentColor"><path d="M9.78 12.78a.75.75 0 0 1-1.06 0L4.47 8.53a.75.75 0 0 1 0-1.06l4.25-4.25a.751.751 0 0 1 1.042.018.751.751 0 0 1 .018 1.042L6.06 8l3.72 3.72a.75.75 0 0 1 0 1.06Z"></path></svg>
        </button>
        <div id="trivia-dots" class="d-flex flex-items-center" style="gap: 8px;"></div>
        <button id="btn-next" type="button" class="btn btn-invisible p-2 text-gray" aria-label="Next">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" fill="currentColor"><path d="M6.22 3.22a.75.75 0 0 1 1.06 0l4.25 4.25a.75.75 0 0 1 0 1.06l-4.25 4.25a.751.751 0 0 1-1.042-.018.751.751 0 0 1-.018-1.042L9.94 8 6.22 4.28a.75.75 0 0 1 0-1.06Z"></path></svg>
        </button>
      </div>

      <!-- Reveal Area (Hidden by default) -->
      <div id="trivia-reveal" style="display: none;">
        <div class="flash-success p-3 rounded-2 mb-4" style="background-color: {% if site.style == 'dark' %}rgba(46,160,67,0.15){% else %}#dcffe4{% endif %}; border: 1px solid {% if site.style == 'dark' %}rgba(46,160,67,0.4){% else %}#34d058{% endif %};">
          <p id="learning-text" class="f4 text-italic mb-0" style="line-height: 1.4; {% if site.style == 'dark' %}color: #7ee787;{% else %}color: #176f2c;{% endif %}">
            <!-- Learning text here -->
          </p>
        </div>

        <div class="d-flex flex-column border-top pt-4 {% if site.style == 'dark' %}border-gray-dark{% else %}border-gray-light{% endif %}" style="width: 100%;">
          <div class="f6 text-gray mb-3 text-left">
            From the article: <strong id="learning-title" class="f5 d-block mt-1 {% if site.style == 'dark' %}text-white{% else %}text-gray-dark{% endif %}"></strong>
          </div>
          <div class="d-flex flex-column flex-sm-row flex-justify-between" style="gap: 12px; width: 100%;">
            <a id="learning-link" href="#" class="btn flex-1 text-center" target="_blank" rel="noopener noreferrer">
              Read Article
            </a>
            <button id="btn-next-question" type="button" class="btn btn-primary flex-1 text-center">
              Next Question &rarr;
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    // We filter to only items with a question to avoid breaking the UI for older cached data
    const rawLearnings = {{ site.data.learning.learnings | jsonify }};
    const allLearnings = rawLearnings ? rawLearnings.filter(l => l.question && l.options) : [];
    let currentLearnings = [...allLearnings];
    
    if (!allLearnings || allLearnings.length === 0) {
      document.getElementById('trivia-question').innerText = "Oops! My AI is currently studying for the next quiz. Check back tomorrow!";
      document.getElementById('trivia-options').style.display = 'none';
      return;
    }

    const questionEl = document.getElementById('trivia-question');
    const optionsEl = document.getElementById('trivia-options');
    const revealEl = document.getElementById('trivia-reveal');
    const learningTextEl = document.getElementById('learning-text');
    const titleEl = document.getElementById('learning-title');
    const linkEl = document.getElementById('learning-link');
    const nextBtn = document.getElementById('btn-next-question');
    const helpersContainer = document.getElementById('trivia-helpers');

    let currentItem = null;
    let currentIndex = 0;

    window.filterTrivia = function(category) {
      if (!allLearnings || allLearnings.length === 0) return;
      
      if (category === 'all') {
        currentLearnings = [...allLearnings];
      } else {
        currentLearnings = allLearnings.filter(l => l.category && l.category.toLowerCase() === category.toLowerCase());
        if (currentLearnings.length === 0) {
          // Fallback to all if no trivia exists for this category
          currentLearnings = [...allLearnings];
        }
      }
      
      currentIndex = 0;
      loadQuestion(currentIndex);
    };

    function updatePagination() {
      const dotsContainer = document.getElementById('trivia-dots');
      dotsContainer.innerHTML = '';
      currentLearnings.forEach((_, idx) => {
        const dot = document.createElement('div');
        dot.className = 'trivia-dot' + (idx === currentIndex ? ' active' : '');
        dotsContainer.appendChild(dot);
      });
      
      const prevBtn = document.getElementById('btn-prev');
      const nextBtn = document.getElementById('btn-next');
      
      prevBtn.disabled = currentIndex === 0;
      nextBtn.disabled = currentIndex === currentLearnings.length - 1;
      
      prevBtn.style.opacity = currentIndex === 0 ? '0.3' : '1';
      prevBtn.style.cursor = currentIndex === 0 ? 'default' : 'pointer';
      
      nextBtn.style.opacity = currentIndex === currentLearnings.length - 1 ? '0.3' : '1';
      nextBtn.style.cursor = currentIndex === currentLearnings.length - 1 ? 'default' : 'pointer';
    }

    function loadQuestion(index) {
      if (index < 0 || index >= currentLearnings.length) return;
      
      currentIndex = index;
      currentItem = currentLearnings[currentIndex];

      revealEl.style.display = 'none';
      helpersContainer.style.display = 'flex';
      optionsEl.innerHTML = '';

      questionEl.innerText = currentItem.question;

      const sourceLinkEl = document.getElementById('trivia-source-link');
      sourceLinkEl.innerText = currentItem.articleTitle;
      sourceLinkEl.href = currentItem.articleUrl;

      currentItem.options.forEach((optText, index) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'btn text-left p-2 text-normal f5 trivia-btn';
        btn.style.width = '100%';
        btn.style.whiteSpace = 'normal';
        btn.innerText = optText;

        btn.onclick = () => handleAnswer(optIndex, btn);
        optionsEl.appendChild(btn);
      });

      updatePagination();
    }

    function handleAnswer(selectedIndex, clickedBtn) {
      helpersContainer.style.display = 'none'; // Hide helpers after answer
      
      const buttons = optionsEl.querySelectorAll('button');
      buttons.forEach((b, i) => {
        b.disabled = true;
        if (i === currentItem.correctIndex) {
          b.classList.add('trivia-correct');
        }
      });

      if (clickedBtn && selectedIndex !== currentItem.correctIndex) {
        clickedBtn.classList.add('trivia-wrong', 'shake-anim');
      }

      learningTextEl.innerText = currentItem.learning;
      titleEl.innerText = currentItem.articleTitle;
      linkEl.href = currentItem.articleUrl;
      revealEl.style.display = 'block';
    }

    document.getElementById('btn-prev').onclick = () => {
      if (currentIndex > 0) loadQuestion(currentIndex - 1);
    };
    
    document.getElementById('btn-next').onclick = () => {
      if (currentIndex < currentLearnings.length - 1) loadQuestion(currentIndex + 1);
    };

    nextBtn.onclick = () => {
      let nextIdx = currentIndex + 1;
      if (nextIdx >= currentLearnings.length) nextIdx = 0;
      loadQuestion(nextIdx);
    };

    // Initial shuffle of allLearnings so they don't always appear in the same order on fresh load
    for (let i = allLearnings.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [allLearnings[i], allLearnings[j]] = [allLearnings[j], allLearnings[i]];
    }
    currentLearnings = [...allLearnings];

    loadQuestion(0);
  });
</script>

<style>
  .learning-board {
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    background: linear-gradient(145deg, {% if site.style == 'dark' %}#24292e, #2f363d{% else %}#ffffff, #f6f8fa{% endif %});
  }
  .learning-board:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 28px rgba(0,0,0,0.12) !important;
  }
  .trivia-btn {
    transition: all 0.2s ease;
    border-radius: 8px;
    border: 1px solid {% if site.style == 'dark' %}#444d56{% else %}#e1e4e8{% endif %};
    background-color: {% if site.style == 'dark' %}#24292e{% else %}#ffffff{% endif %};
  }
  .trivia-btn:hover:not(:disabled) {
    border-color: #0366d6;
    background-color: {% if site.style == 'dark' %}#0d1117{% else %}#f1f8ff{% endif %};
    color: {% if site.style == 'dark' %}#58a6ff{% else %}#0366d6{% endif %};
  }
  .trivia-correct {
    background-color: #2ea44f !important;
    border-color: #2ea44f !important;
    color: #ffffff !important;
  }
  .trivia-wrong {
    background-color: #cb2431 !important;
    border-color: #cb2431 !important;
    color: #ffffff !important;
  }
  
  .trivia-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background-color: {% if site.style == 'dark' %}#444d56{% else %}#d1d5da{% endif %};
    transition: background-color 0.2s ease, transform 0.2s ease;
  }
  .trivia-dot.active {
    background-color: {% if site.style == 'dark' %}#c9d1d9{% else %}#24292e{% endif %};
    transform: scale(1.4);
  }
  
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
  }
  .shake-anim {
    animation: shake 0.3s ease-in-out;
  }
</style>
{% endif %}
