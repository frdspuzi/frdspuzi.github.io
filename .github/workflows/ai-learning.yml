name: AI Learning Trivia

on:
  workflow_call:
  workflow_dispatch:

jobs:
  learning:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node Dependencies
        working-directory: .github/scripts
        run: npm install

      - name: Generate Random Learning via Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node .github/scripts/generate_learning.js

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add _data/learning.json
          
          if git diff-index --quiet HEAD; then
            echo "No new Learning content generated."
          else
            git commit -m "chore: Update AI Learning [skip ci]"
            git pull --rebase
            git push
          fi
