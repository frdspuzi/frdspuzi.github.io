name: Fetch Unsplash Photos

on:
  schedule:
    - cron: '0 0,12 * * *' # Run twice a day
  workflow_dispatch: # Allow manual trigger

jobs:
  fetch-photos:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch photos from Unsplash
        env:
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: |
          mkdir -p _data
          
          echo "Running fetch_unsplash.js..."
          node .github/scripts/fetch_unsplash.js

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add _data/unsplash_latest.json _data/unsplash_popular.json _data/unsplash_favourites.json
          if [ -f _data/unsplash.json ]; then
            git rm _data/unsplash.json || true
          fi
          
          if git diff-index --quiet HEAD; then
            echo "No new photos."
          else
            git commit -m "chore: Update Unsplash photos data (Latest, Popular, Favourites) [skip ci]"
            git push
          fi
