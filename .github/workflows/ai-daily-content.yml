name: Daily AI Content Generation

on:
  schedule:
    - cron: '30 0 * * *' 
  workflow_dispatch: 

jobs:
  generate-ai-content:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Random Learning via Gemini
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node .github/scripts/generate_learning.js

      - name: Generate Gratitude Suggestions via Gemini
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node .github/scripts/generate_gratitude.js

      - name: Fetch Curated YouTube Videos via Gemini
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node .github/scripts/fetch_youtube.js

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add _data/learning.json
          git add _data/gratitude.json
          git add _data/youtube.json
          
          if git diff-index --quiet HEAD; then
            echo "No new AI content generated."
          else
            git commit -m "chore: Update Daily AI Content [skip ci]"
            git pull --rebase
            git push
          fi
