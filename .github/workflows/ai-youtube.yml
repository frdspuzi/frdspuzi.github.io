name: AI YouTube Curator

on:
  workflow_call:
  workflow_dispatch:

jobs:
  youtube:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node Dependencies
        working-directory: .github/scripts
        run: npm install

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: 'github-actions-bot@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com'

      - name: Fetch Curated YouTube Videos via Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: node .github/scripts/fetch_youtube.js

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add _data/youtube.json
          git add _data/youtube_eval_log.json || true
          
          if git diff-index --quiet HEAD; then
            echo "No new YouTube content generated."
          else
            git commit -m "chore: Update AI YouTube Feed [skip ci]"
            git pull --rebase -X theirs
            git push
          fi
